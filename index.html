<script type="text/babel">
const { useState, useEffect, useCallback } = React;

const STAFF = [
  { name:"Anna",        role:"Massage Therapist" },
  { name:"Craig",       role:"Massage Therapist" },
  { name:"Hyacinth",    role:"Massage Therapist" },
  { name:"Katerina",    role:"Massage Therapist" },
  { name:"Nicola",      role:"Massage Therapist" },
  { name:"Tasleem",     role:"Massage Therapist" },
  { name:"Tia",         role:"Massage Therapist" },
  { name:"Jade-Amelia", role:"Nail Technician"   },
  { name:"Michelle",    role:"Nail Technician"   },
  { name:"Shakira",     role:"Nail Technician"   },
  { name:"Isha",        role:"Trainee"           },
  { name:"Natalia",     role:"Trainee"           },
];

const ADMIN_PIN   = "2691";
const RECORDS_KEY = "pp-tc-records";
const PINS_KEY    = "pp-tc-pins";
const DEFAULT_PINS = Object.fromEntries(STAFF.map(s=>[s.name,"0000"]));

const C = {
  brown:"#644830", sage:"#B3B792", rose:"#E0A796",
  amber:"#E09132", sand:"#D1BFA3", cream:"#FAF6F1", white:"#FFFFFF",
};

const fmt = {
  date: iso => new Date(iso).toLocaleDateString("en-GB",{day:"2-digit",month:"short",year:"numeric"}),
  time: iso => new Date(iso).toLocaleTimeString("en-GB",{hour:"2-digit",minute:"2-digit",second:"2-digit"}),
  day:  iso => new Date(iso).toLocaleDateString("en-GB",{weekday:"long"}),
};

function groupByDate(records){
  const g={};
  [...records].reverse().forEach(r=>{
    const d=fmt.date(r.timestamp);
    if(!g[d])g[d]=[];
    g[d].push(r);
  });
  return g;
}

function loadRecords(){ try{return JSON.parse(localStorage.getItem(RECORDS_KEY)||"[]");}catch{return[];} }
function loadPins(){    try{return {...DEFAULT_PINS,...JSON.parse(localStorage.getItem(PINS_KEY)||"{}")};}catch{return DEFAULT_PINS;} }

const page={minHeight:"100vh",background:"linear-gradient(155deg,#FAF6F1 55%,#EDE8E0 100%)",display:"flex",flexDirection:"column",alignItems:"center",padding:"28px 16px 56px"};
const card=(extra={})=>({background:C.white,borderRadius:20,boxShadow:"0 4px 28px rgba(100,72,48,0.10)",padding:"26px 22px",width:"100%",maxWidth:420,...extra});

function LiveClock(){
  const [t,setT]=useState(new Date());
  useEffect(()=>{const id=setInterval(()=>setT(new Date()),1000);return()=>clearInterval(id);},[]);
  const hh=t.getHours().toString().padStart(2,"0");
  const mm=t.getMinutes().toString().padStart(2,"0");
  const ss=t.getSeconds().toString().padStart(2,"0");
  const date=t.toLocaleDateString("en-GB",{weekday:"long",day:"numeric",month:"long"});
  return(
    <div style={{textAlign:"center",marginBottom:20}}>
      <div style={{fontFamily:"'League Spartan',sans-serif",fontSize:50,fontWeight:700,color:C.brown,letterSpacing:"-2px",lineHeight:1}}>
        {hh}<span style={{opacity:.35,animation:"blink 1s step-end infinite"}}>:</span>{mm}
        <span style={{fontSize:26,verticalAlign:"middle",opacity:.5}}>:{ss}</span>
      </div>
      <div style={{fontSize:13,color:C.brown,opacity:.5,marginTop:4}}>{date}</div>
    </div>
  );
}

function PinPad({title,subtitle,error,onBack,onSubmit}){
  const [pin,setPin]=useState("");
  const tap=d=>{
    if(d==="X"){setPin(p=>p.slice(0,-1));return;}
    if(pin.length<4)setPin(p=>p+d);
  };
  useEffect(()=>{if(pin.length===4)onSubmit(pin,()=>setPin(""));},[pin]);
  return(
    <div style={card({textAlign:"center"})}>
      {onBack&&<button onClick={onBack} style={{display:"block",background:"none",border:"none",color:C.brown,fontSize:13,cursor:"pointer",opacity:.55,marginBottom:16}}>← Back</button>}
      <div style={{fontFamily:"'League Spartan',sans-serif",fontSize:21,fontWeight:700,color:C.brown,marginBottom:4}}>{title}</div>
      <div style={{fontSize:13,color:C.brown,opacity:.5,marginBottom:22}}>{subtitle}</div>
      <div style={{display:"flex",justifyContent:"center",gap:10,marginBottom:22}}>
        {[0,1,2,3].map(i=><div key={i} style={{width:13,height:13,borderRadius:"50%",background:pin.length>i?C.brown:"#EDE8E0",transition:"background .15s"}}/>)}
      </div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:10,maxWidth:220,margin:"0 auto 14px"}}>
        {["1","2","3","4","5","6","7","8","9","","0","X"].map((d,i)=>(
          <button key={i} onClick={()=>d!==""&&tap(d)} style={{padding:"15px 0",borderRadius:12,border:"1.5px solid #EDE8E0",background:d===""?"transparent":C.cream,color:C.brown,fontFamily:"'League Spartan',sans-serif",fontSize:d==="X"?16:20,fontWeight:600,cursor:d===""?"default":"pointer",opacity:d===""?0:1}}>{d==="X"?"⌫":d}</button>
        ))}
      </div>
      {error&&<div style={{color:"#C0392B",fontSize:13,marginTop:4}}>{error}</div>}
    </div>
  );
}

function App(){
  const [screen,setScreen]   =useState("home");
  const [records,setRecords] =useState(loadRecords);
  const [pins,setPins]       =useState(loadPins);
  const [selected,setSelected]=useState(null);
  const [pinError,setPinError]=useState("");
  const [adminPinError,setAdminPinError]=useState("");
  const [adminSub,setAdminSub]=useState("log");
  const [adminFilter,setAdminFilter]=useState("all");
  const [editingPin,setEditingPin]=useState(null);
  const [newPinDraft,setNewPinDraft]=useState({});

  const saveRecords=useCallback(nr=>{localStorage.setItem(RECORDS_KEY,JSON.stringify(nr));setRecords(nr);},[]);
  const savePins=useCallback(np=>{localStorage.setItem(PINS_KEY,JSON.stringify(np));setPins(np);},[]);
  const getLastAction=name=>{const m=records.filter(r=>r.name===name);return m.length?m[m.length-1].action:null;};

  const handleVerifyPin=(enteredPin,resetPin)=>{
    if(enteredPin===pins[selected.name]){
      setPinError("");
      const action=getLastAction(selected.name)==="in"?"out":"in";
      const record={id:Date.now(),name:selected.name,role:selected.role,action,timestamp:new Date().toISOString()};
      saveRecords([...records,record]);
      setScreen("success");
      setTimeout(()=>setScreen("home"),3000);
    }else{resetPin();setPinError("Wrong PIN — please try again");}
  };

  const handleAdminPin=(enteredPin,resetPin)=>{
    if(enteredPin===ADMIN_PIN){setAdminPinError("");setScreen("admin");}
    else{resetPin();setAdminPinError("Incorrect PIN");}
  };

  const handleExport=()=>{
    const rows=[["Name","Role","Action","Date","Day","Time"]];
    [...records].reverse().forEach(r=>rows.push([r.name,r.role,r.action==="in"?"Clock In":"Clock Out",fmt.date(r.timestamp),fmt.day(r.timestamp),fmt.time(r.timestamp)]));
    const csv=rows.map(r=>r.map(v=>`"${v}"`).join(",")).join("\n");
    const a=Object.assign(document.createElement("a"),{href:URL.createObjectURL(new Blob([csv],{type:"text/csv"})),download:`pp-timeclock-${new Date().toISOString().slice(0,10)}.csv`});
    a.click();
  };

  // SUCCESS
  if(screen==="success"){
    const last=records[records.length-1];
    return(
      <div style={{...page,justifyContent:"center"}}>
        <div style={{...card({textAlign:"center",animation:"pop .4s ease forwards"})}}>
          <div style={{fontSize:60,marginBottom:12}}>{last?.action==="in"?"👋":"✨"}</div>
          <div style={{fontFamily:"'League Spartan',sans-serif",fontSize:28,fontWeight:700,color:C.brown}}>{last?.action==="in"?"Clocked In!":"Clocked Out!"}</div>
          <div style={{color:C.brown,opacity:.65,marginTop:8,fontSize:15}}>{last?.name} · {fmt.time(last?.timestamp)}</div>
          <div style={{marginTop:20,fontSize:13,color:C.sage,fontWeight:600}}>Returning to home…</div>
        </div>
      </div>
    );
  }

  // STAFF PIN
  if(screen==="staffPin"){
    const last=getLastAction(selected?.name);
    const next=last==="in"?"clock out":"clock in";
    return(
      <div style={{...page,justifyContent:"center"}}>
        <div style={{marginBottom:16,textAlign:"center"}}>
          <div style={{fontFamily:"'League Spartan',sans-serif",fontSize:22,fontWeight:700,color:C.brown}}>{selected?.name}</div>
          <div style={{fontSize:13,color:C.brown,opacity:.45,marginTop:2}}>{last?`Last: ${last==="in"?"clocked in":"clocked out"}`:"No previous record"} · ready to <strong>{next}</strong></div>
        </div>
        <PinPad title="Enter your PIN" subtitle="Your personal 4-digit code" error={pinError} onBack={()=>{setPinError("");setScreen("home");}} onSubmit={handleVerifyPin}/>
      </div>
    );
  }

  // ADMIN PIN
  if(screen==="adminPin"){
    return(
      <div style={{...page,justifyContent:"center"}}>
        <PinPad title="Admin Access" subtitle="Enter admin PIN" error={adminPinError} onBack={()=>{setAdminPinError("");setScreen("home");}} onSubmit={handleAdminPin}/>
      </div>
    );
  }

  // ADMIN DASHBOARD
  if(screen==="admin"){
    const staffNames=[...new Set(records.map(r=>r.name))].sort();
    const filtered=adminFilter==="all"?records:records.filter(r=>r.name===adminFilter);
    const grouped=groupByDate(filtered);
    return(
      <div style={{...page,alignItems:"stretch",maxWidth:720,margin:"0 auto",padding:"28px 16px 56px"}}>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:20}}>
          <div>
            <div style={{fontFamily:"'League Spartan',sans-serif",fontSize:24,fontWeight:800,color:C.brown}}>Admin Panel</div>
            <div style={{fontSize:13,color:C.brown,opacity:.45}}>Project Pamper · 391 Hackney Road</div>
          </div>
          <button onClick={()=>setScreen("home")} style={{padding:"9px 16px",borderRadius:10,border:"none",background:"#EDE8E0",color:C.brown,fontFamily:"'League Spartan',sans-serif",fontSize:13,fontWeight:700,cursor:"pointer"}}>← Exit</button>
        </div>
        <div style={{display:"flex",gap:8,marginBottom:20}}>
          {[["log","Time Log"],["pins","Manage PINs"]].map(([k,l])=>(
            <button key={k} onClick={()=>setAdminSub(k)} style={{padding:"9px 20px",borderRadius:10,border:"none",background:adminSub===k?C.brown:"#EDE8E0",color:adminSub===k?C.white:C.brown,fontFamily:"'League Spartan',sans-serif",fontSize:13,fontWeight:700,cursor:"pointer"}}>{l}</button>
          ))}
        </div>

        {adminSub==="log"&&<>
          <div style={{display:"flex",gap:10,marginBottom:16,flexWrap:"wrap",alignItems:"center"}}>
            <select value={adminFilter} onChange={e=>setAdminFilter(e.target.value)} style={{padding:"9px 14px",borderRadius:10,border:"1.5px solid #EDE8E0",background:C.white,color:C.brown,fontSize:14,flex:1,minWidth:180}}>
              <option value="all">All Staff ({records.length} entries)</option>
              {staffNames.map(n=><option key={n} value={n}>{n}</option>)}
            </select>
            <button onClick={handleExport} style={{padding:"9px 18px",borderRadius:10,border:"none",background:C.sage,color:C.white,fontFamily:"'League Spartan',sans-serif",fontSize:13,fontWeight:700,cursor:"pointer"}}>Export CSV</button>
          </div>
          {Object.keys(grouped).length===0
            ?<div style={{textAlign:"center",padding:40,color:C.brown,opacity:.35,fontFamily:"'League Spartan',sans-serif",fontSize:18}}>No records yet</div>
            :Object.entries(grouped).map(([date,dayRecs])=>(
              <div key={date} style={{marginBottom:18}}>
                <div style={{fontFamily:"'League Spartan',sans-serif",fontSize:12,fontWeight:700,color:C.brown,opacity:.45,letterSpacing:1.2,textTransform:"uppercase",marginBottom:6}}>{fmt.day(dayRecs[0].timestamp)} · {date}</div>
                <div style={{background:C.white,borderRadius:14,overflow:"hidden",boxShadow:"0 2px 12px rgba(100,72,48,0.07)"}}>
                  {dayRecs.map((r,i)=>(
                    <div key={r.id} style={{display:"flex",alignItems:"center",padding:"13px 18px",borderBottom:i<dayRecs.length-1?`1px solid ${C.cream}`:"none",gap:12}}>
                      <div style={{width:7,height:7,borderRadius:"50%",flexShrink:0,background:r.action==="in"?C.sage:C.rose}}/>
                      <div style={{flex:1}}>
                        <div style={{fontFamily:"'League Spartan',sans-serif",fontWeight:700,color:C.brown,fontSize:15}}>{r.name}</div>
                        <div style={{fontSize:12,color:C.brown,opacity:.45}}>{r.role}</div>
                      </div>
                      <div style={{textAlign:"right"}}>
                        <span style={{display:"inline-block",padding:"3px 10px",borderRadius:20,background:r.action==="in"?`${C.sage}22`:`${C.rose}33`,color:r.action==="in"?"#6B7A5A":"#9E6050",fontSize:11,fontWeight:700,letterSpacing:.5}}>{r.action==="in"?"CLOCK IN":"CLOCK OUT"}</span>
                        <div style={{fontSize:13,color:C.brown,fontWeight:600,marginTop:3}}>{fmt.time(r.timestamp)}</div>
                      </div>
                    </div>
                  ))}
                </div>
              </div>
            ))
          }
        </>}

        {adminSub==="pins"&&<>
          <div style={{fontSize:13,color:C.brown,opacity:.55,marginBottom:16}}>Set each staff member's personal PIN. Default is 0000 — update before first shift.</div>
          <div style={{background:C.white,borderRadius:14,overflow:"hidden",boxShadow:"0 2px 12px rgba(100,72,48,0.07)",marginBottom:12}}>
            {STAFF.map((s,i)=>(
              <div key={s.name} style={{borderBottom:i<STAFF.length-1?`1px solid ${C.cream}`:"none"}}>
                {editingPin===s.name?(
                  <div style={{padding:"14px 18px"}}>
                    <div style={{fontFamily:"'League Spartan',sans-serif",fontWeight:700,color:C.brown,fontSize:14,marginBottom:8}}>{s.name}</div>
                    <div style={{display:"flex",gap:8,alignItems:"center"}}>
                      <input type="text" inputMode="numeric" maxLength={4} placeholder="New PIN"
                        value={newPinDraft[s.name]||""}
                        onChange={e=>setNewPinDraft(d=>({...d,[s.name]:e.target.value.replace(/\D/g,"").slice(0,4)}))}
                        style={{flex:1,padding:"10px 12px",borderRadius:8,border:`1.5px solid ${C.sand}`,fontSize:18,letterSpacing:6,color:C.brown}}/>
                      <button onClick={()=>{const np={...pins,[s.name]:newPinDraft[s.name]||pins[s.name]};savePins(np);setEditingPin(null);setNewPinDraft({});}} style={{padding:"10px 16px",borderRadius:8,border:"none",background:C.brown,color:C.white,fontFamily:"'League Spartan',sans-serif",fontSize:13,fontWeight:700,cursor:"pointer"}}>Save</button>
                      <button onClick={()=>{setEditingPin(null);setNewPinDraft({});}} style={{padding:"10px 12px",borderRadius:8,border:"none",background:"#EDE8E0",color:C.brown,cursor:"pointer"}}>✕</button>
                    </div>
                  </div>
                ):(
                  <div onClick={()=>setEditingPin(s.name)} style={{display:"flex",alignItems:"center",padding:"14px 18px",cursor:"pointer",gap:12}}>
                    <div style={{flex:1}}>
                      <div style={{fontFamily:"'League Spartan',sans-serif",fontWeight:700,color:C.brown,fontSize:15}}>{s.name}</div>
                      <div style={{fontSize:12,color:C.brown,opacity:.45}}>{s.role}</div>
                    </div>
                    <div style={{fontFamily:"monospace",fontSize:18,letterSpacing:4,color:C.brown,opacity:.4}}>{"●●●●"}</div>
                    <div style={{fontSize:12,color:C.brown,opacity:.3}}>Edit →</div>
                  </div>
                )}
              </div>
            ))}
          </div>
        </>}
      </div>
    );
  }

  // HOME
  const roles=["Nail Technician","Massage Therapist","Trainee"];
  return(
    <div style={page}>
      <div style={{marginBottom:24,width:"100%",maxWidth:420,textAlign:"center"}}>
        <img src={LOGO_SRC} alt="Project Pamper" style={{width:240,maxWidth:"90%"}}/>
      </div>
      <div style={card({marginBottom:16})}>
        <LiveClock/>
        <div style={{textAlign:"center",fontSize:13,color:C.brown,opacity:.5}}>Tap your name, then enter your PIN</div>
      </div>
      {roles.map(role=>(
        <div key={role} style={{width:"100%",maxWidth:420,marginBottom:4}}>
          <div style={{fontFamily:"'League Spartan',sans-serif",fontSize:11,fontWeight:700,letterSpacing:2,textTransform:"uppercase",color:C.brown,opacity:.4,marginBottom:8,paddingLeft:4,marginTop:12}}>{role}</div>
          {STAFF.filter(s=>s.role===role).map(staff=>{
            const last=getLastAction(staff.name);
            return(
              <button key={staff.name} className="staff-btn"
                onClick={()=>{setSelected(staff);setPinError("");setScreen("staffPin");}}
                style={{width:"100%",marginBottom:8,padding:"15px 20px",borderRadius:14,border:"none",background:C.white,boxShadow:"0 2px 10px rgba(100,72,48,0.08)",display:"flex",alignItems:"center",justifyContent:"space-between",cursor:"pointer",transition:"all .2s",fontFamily:"'League Spartan',sans-serif"}}>
                <div style={{fontWeight:700,fontSize:16,color:C.brown}}>{staff.name}</div>
                <div style={{fontSize:11,fontWeight:700,padding:"4px 10px",borderRadius:20,background:last==="in"?`${C.sage}33`:last==="out"?`${C.rose}22`:"#F0EBE5",color:last==="in"?"#6B7A5A":last==="out"?"#9E6050":C.brown}}>
                  {last==="in"?"IN":last==="out"?"OUT":"—"}
                </div>
              </button>
            );
          })}
        </div>
      ))}
      <button onClick={()=>setScreen("adminPin")} style={{marginTop:20,background:"none",border:`1.5px solid ${C.sand}`,borderRadius:10,padding:"10px 26px",fontFamily:"'League Spartan',sans-serif",fontSize:13,fontWeight:600,color:C.brown,opacity:.6,cursor:"pointer"}}>Admin View</button>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
